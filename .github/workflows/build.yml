name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout manifest
        uses: actions/checkout@v6
        with:
          repository: HydrogreenPollub/zephyr-manifest
          path: zephyr-manifest

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Setup Zephyr project
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: zephyr-manifest
          toolchains: arm-zephyr-eabi

      - name: Build firmware
        working-directory: zephyr-can-converter-unit
        shell: bash
        run: |
          west build -p always -b can_converter .