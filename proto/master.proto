syntax = "proto3";

/**
 * Vehicle type identifier. Values match the CAN DBC VEHICLE_TYPE encoding.
 */
enum VehicleType {
    HYDROS_V1 = 0;
    HYDROS_V2 = 1;
    BOLID = 2;
    HYDRA = 3;
}

/**
 * Digital inputs from the master unit, one field per physical DIN pin.
 * Field numbers follow the DIN pin order (1-based).
 */
message DigitalInputs {
    bool gas_pedal = 1;           // DIN1 — acceleration pedal threshold
    bool start_button = 2;        // DIN2
    bool dead_mans_switch = 3;    // DIN3
    bool emergency_switch = 4;    // DIN4
    bool reset_button = 5;        // DIN5
    bool calibration_button = 6;  // DIN6
    bool leakage_detected = 7;    // DIN7 — hydrogen leakage sensor switch
    bool shell_relay = 8;         // DIN8 — Shell telemetry emergency relay
}

/**
 * Conditioned analog measurements from the master unit.
 * Field layout mirrors the Measurements struct on the TM4C side.
 */
message MasterMeasurements {
    float ai1 = 1;
    float supercapacitor_current = 2;
    float ai3 = 3;
    float ai4 = 4;
    float ai5 = 5;
    float accel_pedal_voltage = 6;
    float brake_pedal_voltage = 7;
    float accessory_battery_current = 8;
    float hydrogen_high_pressure = 9;
    float hydrogen_leakage_sensor_voltage = 10;
    float fuel_cell_output_current = 11;
    float motor_controller_supply_current = 12;
    float accessory_battery_voltage = 13;
    float fuel_cell_output_voltage = 14;
    float supercapacitor_voltage = 15;
    float motor_controller_supply_voltage = 16;
    DigitalInputs din = 17;
    float rpm = 18;
    float speed = 19;
}

/**
 * Master state machine status and actuator outputs.
 * State enum values match the SCADE SSM_ST_mainAutomaton ordering.
 */
message MasterStatus {
    enum State {
        INIT = 0;
        IDLE = 1;
        STARTING = 2;
        RUNNING = 3;
        SHUTTING_DOWN = 4;
        FAILURE = 5;
    }
    uint32 serial_number = 1;
    State state = 2;
    VehicleType vehicle_type = 3;
    bool vehicle_allowed_to_move = 4;
    bool main_valve_enabled = 5;
    bool motor_controller_enabled = 6;
    float accel_output_voltage = 7;
    float brake_output_voltage = 8;
}

/**
 * Data validation faults from the SCADE Validation block.
 * Emergency flags (emg_*) trigger a transition to the Failure state.
 * Error flags (err_*) indicate sensor out-of-range conditions.
 */
message MasterFaults {
    // Emergency flags
    bool emg_emergency_switch = 1;
    bool emg_dead_mans_switch = 2;
    bool emg_leakage_sensor_switch = 3;
    bool emg_hydrogen_leakage_voltage = 4;

    // Sensor error flags
    bool err_fuel_cell_output_voltage = 5;
    bool err_fuel_cell_output_current = 6;
    bool err_supercapacitor_voltage = 7;
    bool err_supercapacitor_current = 8;
    bool err_motor_controller_supply_voltage = 9;
    bool err_motor_controller_supply_current = 10;
    bool err_accessory_battery_voltage = 11;
    bool err_accessory_battery_current = 12;
    bool err_accel_pedal_voltage = 13;
    bool err_brake_pedal_voltage = 14;
    bool err_hydrogen_high_pressure = 15;
    bool err_speed = 16;
}

enum ProtiumOperatingState {
    DISCONNECTED = 0;
    SYSTEM_OFF = 1;
    FIRMWARE_VERSION = 2;
    COMMAND_NOT_FOUND = 3;
    ENTERING_TO_STARTING_PHASE = 4;
    ENTERING_TO_RUNNING_PHASE = 5;
    ANODE_SUPPLY_PRESSURE_CHECK = 6;
    TEMPERATURE_CHECK = 7;
    FC_GAS_SYSTEM_CHECK = 8;
    FC_SEALING_CHECK = 9;
    FC_VOLTAGE_CHECK = 10;
    LOW_H2_SUPPLY = 11;
    SHUTDOWN_INITIATED = 12;
    ABNORMAL_SHUTDOWN_INITIATED = 13;
    RUNNING = 14;
}

message ProtiumValues {
    float fc_v = 1;
    float fc_a = 2;
    float fc_w = 3;
    float energy = 4;
    float fct1 = 5;
    float fan = 6;
    float h2p1 = 7;
    float h2p2 = 8;
    float tank_p = 9;
    float tank_t = 10;
    float v_set = 11;
    float i_set = 12;
    float ucb_v = 13;
    float stasis_selector = 14;
    float stasis_v1 = 15;
    float stasis_v2 = 16;
    float number_of_cell = 17;
    float fct2 = 18;
    float blw = 19;
    float batt_v = 20;
    float ip = 21;
    float tp = 22;
}

message ProtiumStateLogEntry {
    uint32 ms_clock_tick_count = 1;
    ProtiumOperatingState state = 2;
}

message ProtiumOperatingStateMsg {
    ProtiumOperatingState current_state = 1;
    repeated ProtiumStateLogEntry log_entries = 2;
}

message MasterFrame {
    uint32 ms_clock_tick_count = 1;
    uint32 cycle_clock_tick_count = 2;
    oneof payload {
        MasterMeasurements master_measurements = 3;
        MasterStatus master_status = 4;
        ProtiumValues protium_values = 5;
        ProtiumOperatingStateMsg protium_operating_state = 6;
        MasterFaults master_faults = 7;
    }
}
